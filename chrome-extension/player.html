<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movi Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #08080d;
      --bg-surface: #11111a;
      --border-subtle: #1a1a26;
      --border-hover: #8B5CF6;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b8;
      --text-muted: #666;
      --accent: #8B5CF6;
      --accent-soft: rgba(139, 92, 246, 0.14);
    }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    /* ─── Shell ─── */
    .player-shell { width: 100%; height: 100%; display: flex; }
    .player-main {
      flex: 1 1 auto;
      min-width: 0;
      height: 100%;
      position: relative;
      background: #000;
    }
    /* Audio-strip mode: drop the full-viewport black panel so the strip
       doesn't sit at the top of an empty box. The shell becomes a flex
       column-centered surface and the strip floats in the middle —
       gives the extension a clean "native <audio> in a popup" feel
       instead of a tall black slab with a thin bar on top. Overflow
       must stay visible so pop-up menus (speed, audio track, context
       menu) that anchor inside the player can spill out the 56px box. */
    .player-shell.is-audio-strip {
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #0a0a0a;
    }
    .player-main.is-audio-strip {
      height: auto;
      flex: 0 0 auto;
      max-width: 880px;
      width: 100%;
      background: transparent;
      overflow: visible;
    }
    movi-player { width: 100%; height: 100%; display: block; }

    /* ─── Playlist sidebar (matches main app) ─── */
    .playlist-panel {
      flex: 0 0 380px;
      width: 380px;
      height: 100%;
      background: var(--bg);
      border-left: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .playlist-panel[hidden] { display: none; }
    .playlist-panel:focus { outline: none; }
    .playlist-panel:focus-within { border-left-color: rgba(139, 92, 246, 0.4); }
    .playlist-item.highlighted {
      box-shadow: inset 0 0 0 2px var(--accent);
    }
    .playlist-item.highlighted:not(.active) {
      background: rgba(139, 92, 246, 0.08);
      color: var(--text-primary);
    }

    .playlist-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .playlist-header svg.title-icon {
      width: 16px; height: 16px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .playlist-title-group {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .playlist-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .playlist-count {
      font-size: 10.5px;
      color: var(--text-muted);
      background: var(--bg-surface);
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .playlist-close {
      background: transparent;
      border: 0;
      color: var(--text-muted);
      cursor: pointer;
      width: 26px; height: 26px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .playlist-close:hover { background: var(--bg-surface); color: var(--text-primary); }
    .playlist-close svg { width: 14px; height: 14px; }

    .playlist-toolbar {
      padding: 10px 12px;
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .playlist-toolbar button {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 7px 8px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.12s;
      font-family: inherit;
    }
    .playlist-toolbar button:hover {
      background: var(--bg-surface);
      color: var(--text-primary);
      border-color: var(--accent);
    }
    .playlist-toolbar button svg { width: 13px; height: 13px; }
    .playlist-toolbar button.playlist-icon-btn {
      flex: 0 0 auto;
      width: 34px;
      padding: 7px 0;
    }
    .playlist-toolbar button.playlist-icon-btn svg { width: 15px; height: 15px; }
    .playlist-toolbar button[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .playlist-toolbar button[aria-pressed="true"]:hover {
      background: var(--accent);
      color: #fff;
    }
    /* ─── Autoplay toggle switch (YouTube-style) ─── */
    .playlist-toolbar button.autoplay-switch {
      flex: 0 0 auto;
      width: auto;
      padding: 0 4px;
      background: transparent;
      border: none;
    }
    .playlist-toolbar button.autoplay-switch:hover {
      background: transparent;
      border: none;
    }
    .autoplay-switch-track {
      position: relative;
      display: block;
      width: 40px;
      height: 20px;
      border-radius: 10px;
      background: var(--border-subtle);
      transition: background 0.18s ease;
    }
    .autoplay-switch[aria-checked="true"] .autoplay-switch-track {
      background: var(--accent);
    }
    .autoplay-switch-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease;
    }
    .autoplay-switch[aria-checked="true"] .autoplay-switch-knob {
      transform: translateX(20px);
    }
    .autoplay-switch-knob svg {
      width: 9px !important;
      height: 9px !important;
    }
    .autoplay-switch-knob .icon-play { color: var(--accent); display: none; }
    .autoplay-switch-knob .icon-pause { color: var(--text-muted); }
    .autoplay-switch[aria-checked="true"] .icon-play { display: block; }
    .autoplay-switch[aria-checked="true"] .icon-pause { display: none; }

    /* ─── Search ─── */
    .playlist-search {
      position: relative;
      padding: 8px 12px 6px;
      flex-shrink: 0;
    }
    .playlist-search svg {
      position: absolute;
      left: 22px;
      top: 50%;
      transform: translateY(-50%);
      width: 13px;
      height: 13px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .playlist-search input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      padding: 7px 28px 7px 30px;
      border-radius: 8px;
      font-size: 12px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.12s, background 0.12s;
    }
    .playlist-search input:focus {
      border-color: var(--accent);
      background: #15151f;
    }
    .playlist-search input::placeholder { color: var(--text-muted); }
    /* Suppress the browser's built-in clear button on type=search — we ship
       our own, so leaving the native one shows two X icons stacked. */
    .playlist-search input::-webkit-search-cancel-button,
    .playlist-search input::-webkit-search-decoration {
      -webkit-appearance: none;
      appearance: none;
      display: none;
    }
    .playlist-search-clear {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: transparent;
      border: 0;
      color: var(--text-muted);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .playlist-search-clear:hover { color: var(--text-primary); background: #15151f; }
    .playlist-search-clear svg { position: static; transform: none; width: 11px; height: 11px; }
    .playlist-search.has-query .playlist-search-clear { display: flex; }

    .playlist-items {
      margin: 0;
      padding: 6px 8px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
      transition: scrollbar-color 0.2s;
    }
    .playlist-items:hover { scrollbar-color: var(--border-hover) transparent; }
    .playlist-items::-webkit-scrollbar { width: 6px; }
    .playlist-items::-webkit-scrollbar-thumb { background: transparent; border-radius: 3px; transition: background 0.2s; }
    .playlist-items:hover::-webkit-scrollbar-thumb { background: var(--border-hover); }

    .playlist-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.6rem;
      border-radius: 12px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.85rem;
      transition: background 0.18s ease, transform 0.18s ease;
    }
    .playlist-item + .playlist-item { margin-top: 2px; }

    /* Folder rows (tree view) */
    .playlist-folder {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 8px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      border-radius: 10px;
      user-select: none;
      transition: background 0.12s, color 0.12s;
    }
    .playlist-folder + .playlist-item,
    .playlist-item + .playlist-folder,
    .playlist-folder + .playlist-folder { margin-top: 2px; }
    .playlist-folder:hover { background: rgba(255, 255, 255, 0.035); color: var(--text-primary); }
    .playlist-folder .chevron {
      width: 12px; height: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: transform 0.18s ease;
    }
    .playlist-folder.collapsed .chevron { transform: rotate(-90deg); }
    .playlist-folder .folder-icon {
      width: 14px; height: 14px;
      color: var(--accent);
      opacity: 0.85;
      flex-shrink: 0;
    }
    .playlist-folder-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: -0.05px;
    }
    .playlist-folder-count {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-surface);
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 500;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    /* Nested wrapper: vertical guide line + indent so the parent/child
       relationship is unmistakable. Using a real container (not display:
       contents) lets the border-left actually render. */
    .playlist-folder-children {
      margin-left: 16px;
      padding-left: 8px;
      border-left: 1px solid var(--border-subtle);
      transition: border-color 0.15s;
    }
    .playlist-folder-children:hover { border-left-color: rgba(139, 92, 246, 0.35); }
    .playlist-folder-children.hidden { display: none; }

    .playlist-item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%) scaleY(0);
      width: 3px;
      height: 70%;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
      transition: transform 0.2s ease;
    }
    .playlist-item:hover {
      background: rgba(255, 255, 255, 0.035);
      color: var(--text-primary);
    }
    .playlist-item.active {
      background: linear-gradient(90deg, rgba(124, 108, 240, 0.14) 0%, rgba(124, 108, 240, 0.06) 100%);
      color: var(--text-primary);
    }
    .playlist-item.active::before { transform: translateY(-50%) scaleY(1); }

    .playlist-thumb {
      position: relative;
      flex-shrink: 0;
      width: 112px;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, #1a1a20 0%, #0d0d12 100%);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .playlist-thumb:not(.no-thumb):not(:has(.playlist-thumb-img:not([hidden])))::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 20%, rgba(255, 255, 255, 0.045) 50%, transparent 80%);
      background-size: 220% 100%;
      animation: playlistShimmer 1.8s ease-in-out infinite;
    }
    @keyframes playlistShimmer {
      0% { background-position: 120% 0; }
      100% { background-position: -20% 0; }
    }
    .playlist-thumb-fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: #4a4a52;
      pointer-events: none;
    }
    .playlist-thumb.no-thumb .playlist-thumb-fallback { display: flex; }
    .playlist-thumb-fallback svg { width: 28px; height: 28px; opacity: 0.65; }
    .playlist-item:hover .playlist-thumb { transform: scale(1.02); }
    .playlist-item.active .playlist-thumb {
      box-shadow: 0 0 0 1px rgba(124, 108, 240, 0.5), 0 4px 14px rgba(124, 108, 240, 0.25);
    }
    .playlist-thumb-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .playlist-thumb-duration {
      position: absolute;
      right: 4px; bottom: 4px;
      padding: 2px 5px;
      font-size: 0.64rem;
      line-height: 1;
      color: #fff;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 4px;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .playlist-thumb-hdr {
      position: absolute;
      left: 5px; top: 5px;
      padding: 2px 6px;
      font-size: 0.58rem;
      line-height: 1;
      color: #fff;
      background: #e11d48;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.6px;
    }
    .playlist-thumb-fps {
      position: absolute;
      right: 5px; top: 5px;
      padding: 2px 6px;
      font-size: 0.58rem;
      line-height: 1;
      color: #fff;
      background: #0ea5e9;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.6px;
    }
    .playlist-thumb-progress {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      z-index: 2;
    }
    .playlist-thumb-progress[hidden] { display: none; }
    .playlist-thumb-progress-bar {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.25s ease;
    }
    .playlist-thumb-playing {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 100%);
      color: #fff;
    }
    .playlist-thumb-playing svg { filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6)); }
    .playlist-item.active .playlist-thumb-playing { display: flex; }

    .playlist-item-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .playlist-item-name {
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-clamp: 2;
      font-size: 0.82rem;
      line-height: 1.32;
      color: inherit;
      word-break: break-word;
      font-weight: 500;
      letter-spacing: -0.1px;
    }
    .playlist-item.active .playlist-item-name { font-weight: 600; }
    .playlist-item-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: 0.1px;
    }
    .playlist-item-meta .meta-res { color: var(--text-secondary); font-weight: 600; }

    /* Floating toggle when playlist hidden */
    .playlist-toggle {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 50;
      background: rgba(15, 15, 22, 0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      width: 38px; height: 38px;
      border-radius: 10px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .playlist-toggle:hover {
      background: rgba(25, 25, 35, 0.92);
      border-color: var(--accent);
    }
    .playlist-toggle.visible { display: flex; }
    .playlist-toggle svg { width: 16px; height: 16px; }

    /* ─── File overlay (initial / branded hero) ─── */
    .file-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background:
        radial-gradient(ellipse 60% 50% at 50% 32%, rgba(139, 92, 246, 0.13), transparent 70%),
        var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text-primary);
    }
    .file-overlay.hidden { display: none; }
    .drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      width: 100%;
      height: 100%;
    }
    /* Drag-over → full-viewport accent ring + glow */
    .drop-zone::before {
      content: "";
      position: fixed;
      inset: 14px;
      border: 2px dashed transparent;
      border-radius: 26px;
      pointer-events: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .drop-zone.dragover::before {
      border-color: var(--accent);
      box-shadow: inset 0 0 90px -24px rgba(139, 92, 246, 0.45);
    }

    .brand { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .brand-logo {
      width: 84px;
      height: 84px;
      position: relative;
      transition: transform 0.3s;
    }
    .brand-logo img {
      width: 84px;
      height: 84px;
      display: block;
      border-radius: 50%;
      box-shadow: 0 18px 54px -14px rgba(139, 92, 246, 0.65);
    }
    .brand-logo::after {
      content: "";
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.32), transparent 70%);
      opacity: 0.55;
      z-index: -1;
      transition: opacity 0.3s;
    }
    .drop-zone.dragover .brand-logo { transform: translateY(-6px) scale(1.05); }
    .drop-zone.dragover .brand-logo::after { opacity: 1; }

    .drop-text { text-align: center; }
    .drop-text h2,
    .brand-name {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.6px;
      line-height: 1.1;
      margin-bottom: 8px;
      background: linear-gradient(92deg, #ffffff, #c4b5fd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .drop-text p,
    .brand-tagline { font-size: 13.5px; color: var(--text-muted); line-height: 1.5; }

    .drop-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; align-items: center; }
    .browse-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .browse-btn:hover {
      background: #7C3AED;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(139,92,246,0.35);
    }
    .browse-btn svg { width: 15px; height: 15px; }
    .browse-btn.secondary {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }
    .browse-btn.secondary:hover {
      background: var(--bg-surface);
      color: var(--text-primary);
      border-color: var(--accent);
      box-shadow: none;
      transform: translateY(-2px);
    }
    .drop-formats {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      margin-top: 2px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--text-muted);
    }
    .drop-formats span { display: inline-flex; align-items: center; gap: 7px; }
    .drop-formats span::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.7;
    }
    .promo-links {
      position: absolute;
      bottom: 20px;
      display: flex;
      gap: 16px;
    }
    .promo-links a {
      color: #2a2a35;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      transition: color 0.15s;
    }
    .promo-links a:hover { color: var(--accent); }
    .promo-links a svg { width: 14px; height: 14px; }

    /* ─── Cache panel (overlay bottom-right) ─── */
    .cache-info {
      position: absolute;
      bottom: 20px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: #444;
      font-family: -apple-system, sans-serif;
    }
    .cache-info .cache-size {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .cache-info .cache-size svg {
      width: 12px;
      height: 12px;
      color: #3a3a45;
    }
    .cache-info .cache-clear {
      background: transparent;
      border: 1px solid #2a2a35;
      color: #888;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .cache-info .cache-clear:hover {
      border-color: var(--accent);
      color: #ddd;
    }
    .cache-info .cache-clear:disabled {
      opacity: 0.5;
      cursor: default;
      border-color: #2a2a35;
      color: #666;
    }

    /* ─── Loading overlay ─── */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9998;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      color: #fff;
    }
    .loading-overlay.hidden { display: none; }
    .loading-spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(139, 92, 246, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: movi-spin 0.8s linear infinite;
    }
    @keyframes movi-spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: #888; letter-spacing: 0.3px; }
    .loading-name { font-size: 12px; color: #444; max-width: 80%; text-align: center; word-break: break-all; }

    @media (max-width: 720px) {
      .playlist-panel { display: none; }
    }
  </style>
</head>
<body>
  <div class="player-shell" id="playerShell">
    <div class="player-main">
      <movi-player
        id="player"
        controls
        thumb
        fastseek
        showtitle
        ambientmode
        resume
      ></movi-player>

      <button class="playlist-toggle" id="playlistToggle" title="Show files" aria-label="Show files">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
    </div>

    <aside class="playlist-panel" id="playlistPanel" hidden tabindex="0" aria-label="Playlist">
      <div class="playlist-header">
        <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <div class="playlist-title-group">
          <span class="playlist-title" id="playlistTitle">Playlist</span>
          <span class="playlist-count" id="playlistCount">0</span>
        </div>
        <button class="playlist-close" id="playlistClose" title="Hide" aria-label="Hide playlist">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/>
          </svg>
        </button>
      </div>
      <div class="playlist-toolbar">
        <button id="addFilesBtn" title="Add files">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
          Add files
        </button>
        <button id="addFolderBtn" title="Add folder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          Add folder
        </button>
        <button id="nextBtn" class="playlist-icon-btn" title="Next" aria-label="Play next">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 4 15 12 5 20 5 4" fill="currentColor" stroke="none"/><line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
        <button id="shuffleBtn" class="playlist-icon-btn" title="Shuffle" aria-label="Shuffle" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/>
          </svg>
        </button>
        <button id="autoplayBtn" class="autoplay-switch" title="Autoplay next" aria-label="Autoplay next" role="switch" aria-checked="false">
          <span class="autoplay-switch-track">
            <span class="autoplay-switch-knob">
              <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
              <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="7 5 19 12 7 19 7 5"/></svg>
            </span>
          </span>
        </button>
      </div>
      <div class="playlist-search" id="playlistSearchWrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="playlistSearch" placeholder="Search files..." autocomplete="off" spellcheck="false">
        <button class="playlist-search-clear" id="playlistSearchClear" title="Clear">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/>
          </svg>
        </button>
      </div>
      <div class="playlist-items" id="playlistItems"></div>
    </aside>
  </div>

  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading video</div>
    <div class="loading-name" id="loadingName"></div>
  </div>

  <div class="file-overlay hidden" id="fileOverlay">
    <div class="promo-links">
      <a href="https://github.com/MrUjjwalG/movi-player" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 00-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.2.5-2.3 1.3-3.1-.2-.4-.6-1.6.1-3.2 0 0 1-.3 3.4 1.2a11.5 11.5 0 016 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.6.3 2.8.2 3.2.7.8 1.2 1.9 1.2 3.1 0 4.6-2.8 5.6-5.5 5.9.5.4.9 1.2.9 2.4v3.5c0 .3.2.7.8.6A12 12 0 0012 .3"/></svg>
        GitHub
      </a>
      <a href="https://www.npmjs.com/package/movi-player" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M0 7.334v8h6.666v1.332H12v-1.332h12v-8H0zm6.666 6.664H5.334v-4H3.999v4H1.335V8.667h5.331v5.331zm4 0v1.336H8.001V8.667h5.334v5.331h-2.669zm12.001 0h-1.33v-4h-1.336v4h-1.335v-4h-1.33v4h-2.671V8.667h8.002v5.331z"/></svg>
        npm
      </a>
      <a href="https://mrujjwalg.github.io/movi-player/" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Docs
      </a>
    </div>
    <div class="drop-zone" id="dropZone">
      <div class="brand">
        <div class="brand-logo">
          <img src="icons/logo.svg" alt="Movi Player">
        </div>
        <div class="drop-text">
          <h2 class="brand-name">Movi Player</h2>
          <p class="brand-tagline">Play any video format — drop a file or pick from your device</p>
        </div>
      </div>
      <div class="drop-actions">
        <label class="browse-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
          Choose Files
          <input type="file" id="filePicker" accept="video/*,audio/*,.mkv,.ts,.m2ts,.mts,.evo,.avi,.flv,.wmv,.mov,.mka,.m4b,.opus,.oga,.dts,.ac3,.ec3,.eac3" multiple style="display:none">
        </label>
        <label class="browse-btn secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          Choose Folder
          <input type="file" id="folderPicker" webkitdirectory multiple style="display:none">
        </label>
      </div>
      <div class="drop-formats">
        <span>100% Local</span><span>HDR &amp; 4K</span><span>HEVC · AV1</span><span>MKV · TS</span>
      </div>
    </div>
    <div class="cache-info" id="cacheInfo">
      <span class="cache-size" id="cacheSize" title="Cached thumbnails">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/>
        </svg>
        <span id="cacheSizeText">—</span>
      </span>
      <button class="cache-clear" id="cacheClearBtn" title="Clear thumbnail cache">Clear cache</button>
    </div>
  </div>

  <script type="module" src="player.js"></script>
</body>
</html>
