<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="%CSP%">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movi Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    movi-player { width: 100%; height: 100%; display: block; }

    /* Audio-strip mode: centre the 56px strip in the viewport instead
       of pinning it to the top of a tall black slab. Matches the
       chrome-extension / player.html layout. */
    body:has(movi-player.movi-audio-strip) {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #0a0a0a;
    }
    body:has(movi-player.movi-audio-strip) movi-player {
      width: 100%;
      max-width: 880px;
      height: auto;
      flex: 0 0 auto;
    }

    .loading-overlay {
      position: fixed; inset: 0; z-index: 9998; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; font-family: -apple-system, sans-serif; color: #fff;
    }
    .loading-overlay.hidden { display: none; }
    .loading-spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(139, 92, 246, 0.2);
      border-top-color: #8B5CF6; border-radius: 50%;
      animation: movi-spin 0.8s linear infinite;
    }
    @keyframes movi-spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: #888; }
    .loading-name { font-size: 12px; color: #444; max-width: 80%; text-align: center; word-break: break-all; }
  </style>

  <!-- Spoof crossOriginIsolated=true so MoviElement.checkSecurityHeaders() passes.
       VS Code webviews can't actually set COOP/COEP headers, but the runtime
       check is the only blocker — SAB-dependent paths gracefully fall back. -->
  <script>
    try {
      Object.defineProperty(window, "crossOriginIsolated", {
        value: true, configurable: true, writable: false,
      });
    } catch (e) { /* noop */ }
  </script>
</head>
<body>
  <movi-player id="player" %PLAYER_ATTRS%></movi-player>

  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading video</div>
    <div class="loading-name" id="loadingName"></div>
  </div>

  <script src="%ELEMENT_JS%" type="module"></script>
  <script src="%PLAYER_JS%"></script>
</body>
</html>
