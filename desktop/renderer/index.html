<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoviPlayer</title>
    <link rel="stylesheet" href="/styles.css" />
    <!-- Player web component (WASM embedded); registers <movi-player> on load -->
    <script type="module" src="/vendor/element.js"></script>
  </head>
  <body>
    <!-- Always-present transparent strip to drag the frameless window -->
    <div class="drag-strip"></div>

    <main class="stage">
      <section class="welcome" id="welcome">
        <div class="welcome-inner">
          <p class="eyebrow">Plays what others can't</p>

          <h1 class="title">Play anything.</h1>
          <span class="spectrum" aria-hidden="true"></span>

          <p class="lede">
            MKV, HEVC, AV1, VP9 and 4K&nbsp;HDR — decoded right here on your
            machine. Nothing's uploaded.
          </p>

          <ul class="codec-strip" aria-label="Formats this player decodes">
            <li>MKV</li>
            <li>HEVC</li>
            <li>AV1</li>
            <li>VP9</li>
            <li>HDR10</li>
            <li>10-bit</li>
          </ul>

          <!-- Primary action: the drop target -->
          <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Open a video file">
            <span class="dropzone-glow" aria-hidden="true"></span>
            <span class="dropzone-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="26" height="26">
                <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"
                  d="M12 3v11m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" />
              </svg>
            </span>
            <span class="dropzone-text">
              <strong>Drop a video to play</strong>
              <small>or <span class="link">choose a file</span></small>
            </span>
          </div>

          <!-- Secondary action: a URL -->
          <form class="urlbar" id="url-form" autocomplete="off">
            <span class="urlbar-label">URL</span>
            <input
              id="url-input"
              type="text"
              inputmode="url"
              spellcheck="false"
              placeholder="https://…  paste a direct video link"
            />
            <button class="url-paste" id="url-paste" type="button" title="Paste link from clipboard" aria-label="Paste link from clipboard">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="8" y="3" width="8" height="4" rx="1" />
                <path d="M16 5h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2" />
              </svg>
            </button>
            <button class="play" type="submit">Play</button>
          </form>

          <!-- Recent files (populated from main) -->
          <section class="recents" id="recents" hidden>
            <header class="recents-head">
              <span class="section-label">Recent</span>
              <button class="link link-dim" id="recents-clear" type="button">Clear</button>
            </header>
            <ul class="recents-list" id="recents-list"></ul>
          </section>
        </div>
      </section>

      <!-- Full-bleed player. With ambientmode and NO external wrapper, the
           player tints its own letterbox (black) bars with the sampled frame
           colour — the ambient lives inside the video area. -->
      <movi-player
        id="player"
        renderer="canvas"
        controls
        objectfit="control"
        gesturefs
        thumb
        fastseek
        showtitle
        ambientmode
        resume
        stablevolume
        hidden
      ></movi-player>

      <!-- Floating button to reopen the playlist (shown when one exists) -->
      <button class="pl-toggle" id="pl-toggle" hidden aria-label="Show playlist">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h13M3 12h13M3 18h9M18 15v6m0 0 3-3m-3 3-3-3" />
        </svg>
        <span class="pl-toggle-count" id="pl-toggle-count"></span>
      </button>

      <!-- Playlist (multi-select) — a flex sibling, so the player shrinks for it -->
      <aside class="playlist-panel" id="playlist-panel">
        <header class="pl-head">
          <span class="pl-title">Playlist <span class="pl-count" id="pl-count"></span></span>
          <button class="pl-close" id="pl-close" type="button" aria-label="Close playlist">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M6 6l12 12M18 6 6 18" />
            </svg>
          </button>
        </header>
        <ul class="pl-items" id="pl-items"></ul>
      </aside>
    </main>

    <!-- Full-window drag overlay -->
    <div class="drop-overlay" id="drop-overlay" aria-hidden="true">
      <div class="drop-card">
        <span class="spectrum spectrum-wide" aria-hidden="true"></span>
        Release to play
      </div>
    </div>

    <!-- Open-URL modal (works during playback, unlike the welcome URL bar) -->
    <div class="url-modal" id="url-modal" hidden>
      <form class="url-modal-card" id="url-modal-form" autocomplete="off">
        <p class="url-modal-title">Open URL</p>
        <div class="urlbar">
          <span class="urlbar-label">URL</span>
          <input id="modal-url-input" type="text" inputmode="url" spellcheck="false" placeholder="https://…  paste a video link" />
          <button class="url-paste" id="modal-url-paste" type="button" title="Paste link from clipboard" aria-label="Paste from clipboard">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="8" y="3" width="8" height="4" rx="1" />
              <path d="M16 5h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2" />
            </svg>
          </button>
        </div>
        <div class="url-modal-actions">
          <button type="button" class="modal-cancel" id="url-modal-cancel">Cancel</button>
          <button type="submit" class="play">Play</button>
        </div>
      </form>
    </div>

    <div class="toast" id="toast" role="status" hidden></div>

    <script type="module" src="/renderer.js"></script>
  </body>
</html>
